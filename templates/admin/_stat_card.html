{% comment %}Carte statistique réutilisable — usage : {% include "admin/_stat_card.html" with label="..." value=X sub=Y sub_label="..." icon="..." %}{% endcomment %}
<div style="border:1px solid var(--color-base-200,#e5e7eb);border-radius:10px;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:.25rem;">
  <div style="display:flex;align-items:center;gap:.5rem;color:var(--color-primary-400,#3b5fa0);font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">
    <span class="material-symbols-outlined" style="font-size:1.1rem;">{{ icon }}</span>
    {{ label }}
  </div>
  <div style="font-size:2rem;font-weight:700;font-variant-numeric:tabular-nums;">{{ value }}</div>
  {% if sub_label %}
  <div style="font-size:.8rem;opacity:.65;">dont <strong>{{ sub }}</strong> {{ sub_label }}</div>
  {% endif %}
</div>
